kind = "web"
previewPath = "/"
title = "Petro West"
version = "1.0.0"
id = "artifacts/petro-west"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19815
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/petro-west run dev"

[services.env]
PORT = "19815"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/petro-west", "run", "build"]
publicDir = "artifacts/petro-west/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
